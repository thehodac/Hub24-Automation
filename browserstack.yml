# =============================================================
# BrowserStack config for HUB24 Playwright tests (SDK runner).
# Run with:  npm run test:browserstack
# =============================================================

# --- Credentials ---
# DO NOT hard-code the key here. Set these as environment variables instead:
#   BROWSERSTACK_USERNAME  and  BROWSERSTACK_ACCESS_KEY
# (env vars override the values below). Placeholders kept for reference only.
userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

# --- Reporting (shown on the BrowserStack dashboard) ---
projectName: HUB24 Automation
buildName: HUB24 Playwright
buildIdentifier: '#${BUILD_NUMBER}'

# --- Real browsers / OS to run the tests on ---
# Full list: https://www.browserstack.com/list-of-browsers-and-platforms/automate
platforms:
  - os: Windows
    osVersion: 11
    browserName: chrome
    browserVersion: latest
  - os: OS X
    osVersion: Ventura
    browserName: playwright-webkit
    browserVersion: latest
  - os: Windows
    osVersion: 11
    browserName: playwright-firefox
    browserVersion: latest

# Parallel threads per platform (1 = run each platform once).
parallelsPerPlatform: 1

# Set to true ONLY if the site under test is internal/not public
# (e.g. a private HUB24 UAT). Opens a secure tunnel from BrowserStack.
browserstackLocal: false

framework: playwright

# Debugging / reporting features
debug: false
networkLogs: false
consoleLogs: errors
testObservability: true
