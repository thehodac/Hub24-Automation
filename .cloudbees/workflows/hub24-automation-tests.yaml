apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: hub24-playwright-tests

# Chạy mỗi khi có code mới đẩy lên nhánh chính (main hoặc master).
# (Repo công ty thường dùng 'main', repo cũ dùng 'master' — để cả hai cho chắc.)
on:
  push:
    branches:
      - main
      - master
  # Cho phép bấm chạy tay từ giao diện CloudBees.
  workflow_dispatch:

jobs:
  test:
    # Chạy trong container Node trên hạ tầng CloudBees (không cần máy của bạn).
    steps:
      - name: Check out code
        uses: cloudbees-io/checkout@v1

      - name: Run e2e + api + accessibility (auto-create tickets)
        id: functional
        # Test rớt vẫn tạo ticket. continue-on-error để job không dừng, nhưng
        # steps.functional.outcome vẫn ghi 'failure' -> cổng BrowserStack biết.
        continue-on-error: true
        # Chạy 3 phần trong MỘT lệnh -> 1 log gộp + 1 lượt tạo ticket:
        #   --project=chromium      -> UI + accessibility specs
        #   --project=e2e           -> regression / E2E (tests/e2e)
        #   --project=api           -> API / HTTP checks (tests/api)
        # Đang chạy trên project mẫu SauceDemo (mỗi spec tự set baseURL riêng),
        # nên chưa cần môi trường HUB24. Phần visual/Chromatic ở step riêng bên dưới.
        # Image Playwright chính thức của Microsoft: sẵn 3 trình duyệt + thư viện.
        uses: docker://mcr.microsoft.com/playwright:v1.61.0-jammy
        env:
          HOME: /root
          # CI=true -> Playwright dùng workers:1 (theo config) => chỉ mở 1 trình
          # duyệt tại một thời điểm, tránh vượt 4GB RAM và bị CloudBees ngắt.
          CI: "true"
          # Report của CI lưu vào folder riêng.
          TEST_REPORT_DIR: test-report-cloudbees-browserstack
          # QUAN TRỌNG: CloudBees sẽ cho LỖI cả workflow nếu tham chiếu một secret
          # CHƯA được tạo. Vì vậy ở đây CHỈ dùng 5 secret Jira đã tạo.
          JIRA_CREATE_TICKETS: "true"
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_PARENT_KEY: ${{ secrets.JIRA_PARENT_KEY }}
          # (Tuỳ chọn) tạo secret tương ứng rồi bỏ dấu # để bật:
          # JIRA_ISSUE_TYPE: ${{ secrets.JIRA_ISSUE_TYPE }}
          # JIRA_SUBTASK_TYPE: ${{ secrets.JIRA_SUBTASK_TYPE }}
          # Asana để sau — tạo secret ASANA_* rồi mới bỏ # ở 3 dòng dưới:
          # ASANA_CREATE_TICKETS: ${{ secrets.ASANA_CREATE_TICKETS }}
          # ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          # ASANA_PROJECT_GID: ${{ secrets.ASANA_PROJECT_GID }}
        run: |
          # Firefox không khởi động được nếu $HOME không thuộc quyền user
          # trong container -> đặt HOME=/root (theo khuyến nghị của Playwright).
          export HOME=/root
          npm ci
          npx playwright test --project=chromium --project=e2e --project=api --workers=1

      - name: Visual regression + Chromatic build + auto-create ticket
        id: chromatic
        continue-on-error: true
        # 1 lệnh làm 3 việc (scripts/visual-with-chromatic.mjs):
        #   [1/3] chạy visual test -> tạo archives + ảnh baseline cục bộ
        #   [2/3] upload lên Chromatic (--force-rebuild) -> LUÔN tạo build mới
        #   [3/3] chạy lại -> tạo ticket kèm ảnh before/after + link build
        # Ticket Chromatic KHÔNG phải Bug (tiền tố [Chromatic-Issue]).
        uses: docker://mcr.microsoft.com/playwright:v1.61.0-jammy
        env:
          HOME: /root
          CI: "true"   # workers:1 -> đỡ tốn RAM (tránh vượt 4GB)
          TEST_REPORT_DIR: test-report-cloudbees-browserstack
          # Cần secret CHROMATIC_PROJECT_TOKEN tồn tại trên CloudBees, nếu không
          # cả workflow sẽ lỗi "secrets.CHROMATIC_PROJECT_TOKEN is undefined".
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          JIRA_CREATE_TICKETS: "true"
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_PARENT_KEY: ${{ secrets.JIRA_PARENT_KEY }}
          # Asana để sau (tạo secret ASANA_* rồi bỏ # để bật):
          # ASANA_CREATE_TICKETS: ${{ secrets.ASANA_CREATE_TICKETS }}
          # ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          # ASANA_PROJECT_GID: ${{ secrets.ASANA_PROJECT_GID }}
        run: |
          export HOME=/root
          npm ci
          npm run test:visual:chromatic

      - name: Cross-browser on BrowserStack (chỉ chạy khi các phần trên PASS)
        # CỔNG: chỉ chạy nếu e2e/api/accessibility VÀ Chromatic đều pass hết.
        # Dùng .outcome vì continue-on-error che 'failure' khỏi trạng thái job,
        # nhưng .outcome vẫn phản ánh kết quả thật của từng step.
        continue-on-error: true
        # Fail -> tự tạo ticket Jira [BrowserStack-Bug] (BUG_CATEGORY_OVERRIDE).
        uses: docker://node:20-bookworm
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          CI: "true"
          BUG_CATEGORY_OVERRIDE: browserstack
          TEST_REPORT_DIR: test-report-cloudbees-browserstack
          JIRA_CREATE_TICKETS: "true"
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_PARENT_KEY: ${{ secrets.JIRA_PARENT_KEY }}
        run: |
          npm ci
          npm run test:browserstack
